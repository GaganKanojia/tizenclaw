# TizenClaw Binary Repository Configuration
#
# Used by deploy.sh to set up on-device repos for installing
# runtime dependencies (e.g., jq, curl, bash).
#
# Format: key = value
# Configure base and platform repo URLs for your target snapshot.

[repos]
# Tizen 7.0 Base repository (core OS packages, aarch64)
base = https://download.tizen.org/releases/milestone/tizen/7.0/tizen-7.0-base/latest/repos/standard/packages/

# Tizen 7.0 Platform repository (platform-specific packages, aarch64)
platform = https://download.tizen.org/releases/milestone/tizen/7.0/tizen-7.0-unified/latest/repos/standard/packages/
